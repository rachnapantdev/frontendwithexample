<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">\
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head >
<body class="bg-light">
    <h1 class="text-center text-light">This is a basic Web Page !! </h1>
    <h1 class="text-center text-success">This is a basic Web Page !! </h1>
    <button class="btn btn-info" onclick="changeMode()">Dark </button>

<div style="border: 2px solid; width: 4%; border-radius: 20px; text-align: center;">
    <i class="bi bi-amazon text-warning"></i>
</div>
<i class="bi bi-volume-up-fill text-success "></i>
    <script>
        function changeMode(){
            document.body.classList.toggle("bg-dark");
           
        }
    </script>
</body>
</html>
