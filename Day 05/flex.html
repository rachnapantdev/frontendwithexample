<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            gap: 20px;
            /* flex-direction: ; */
            flex-wrap: wrap;
        }
        .item{
            height: 200px ;
            width: 200px;
            border: 10px solid rebeccapurple;
            transition: 2s ;
        }
        .item:hover{
            /* transform: rotate(45deg); */
            transform: scale(1.1);
            background-color: plum;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>

</body>
</html>
