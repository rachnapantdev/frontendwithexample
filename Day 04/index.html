<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
        }
        /* Element Selector */
        header{
            height: 200px;
            background-color: plum;
        }
        nav{
            height: 100px;
            background-color: purple;
        }
        .container{
            height: 400px;
            /* width: 400px; */
            background-color: beige;
        }
        .container h1{
            font-size: 90px;
            text-align: center;
            text-transform: uppercase;
        }
        aside{
            height: 200px;
            background-color: bisque;

        } 
        a {
            color: black;
            font-size: 25px;
            text-decoration: none;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }
        footer{
            height: 500px;
            background-image: url("https://cdn.pixabay.com/photo/2022/10/02/13/07/autumn-7493439_1280.jpg");
            background-size: cover;
            background-position: center;

        }
        .image-color{
            height: 500px;
            background-image: linear-gradient(rgba(0, 0, 0, 0.521), rgba(255, 217, 0, 0.489)), url("https://cdn.pixabay.com/photo/2022/10/02/13/07/autumn-7493439_1280.jpg");
        }
        .first{
            height: 200px;
            background-image: linear-gradient(plum, pink, yellow);
        }

    </style>
</head>
<body>
        <header> </header>
        <nav></nav>
        <section class="container">
            <h1> This is Heading </h1>
        </section>
        <aside>
            <ul>
                <li> <a href=""> Home</a> </li>
                <li> <a href=""> About</a> </li>
                <li> <a href=""> Contact</a> </li>
            </ul>
        </aside>
        <div class="first">
        </div>
        <footer>
        </footer>
            <div class="image-color">
            </div>

</body>
</html>
