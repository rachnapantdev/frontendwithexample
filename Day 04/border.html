<html lang="en">
<head>

    <title>Document</title>
    <style>
        .border-1 {
            height: 200px;
            width: 200px;
            background-color: palevioletred;
            border: 10px groove goldenrod;
            margin: auto;
            border-radius: 10%;
        }
         .border-2 {
            height: 200px;
            width: 200px;
            background-color: palevioletred;
            border: 10px solid goldenrod;
            /* margin: auto; */
            border-radius: 50%;
        }
        .border-3{
            height: 300px;
            width: 300px;
            background-color: plum;
            /* border-top: 20px solid mediumorchid;
            border-bottom: 20px groove rosybrown; */
            border-width: 10px 20px 30px 50px;
            border-color: teal rebeccapurple beige lavender;
            border-style: solid;
        }
    </style>
</head>

<body>
    <div class="border-1">

    </div>
    <div class="border-2">

    </div>
    <div class="border-3"></div>
</body>

</html>
